name: Jalankan Jadwal Absen

on:
  schedule:
    # Setiap 5 menit -- ini interval minimum yang disarankan GitHub Actions.
    # Presisi cron GitHub TIDAK dijamin persis di detik/menit tsb, terutama
    # saat traffic tinggi bisa telat beberapa menit. Kalau butuh lebih presisi,
    # lihat catatan "Presisi Waktu" di README/pesan penjelasan.
    - cron: "*/5 * * * *"
  workflow_dispatch: {} # supaya bisa dites manual dari tab Actions

jobs:
  run-absen-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Validasi secrets
        run: |
          if [ -z "${APP_URL}" ]; then
            echo "::error::Secret ABSEN_APP_URL kosong/belum di-set di repo ini (Settings > Secrets and variables > Actions)."
            exit 1
          fi
          case "$APP_URL" in
            https://*|http://*) ;;
            *)
              echo "::error::ABSEN_APP_URL harus diawali https:// (isi sekarang: '${APP_URL}')."
              exit 1
              ;;
          esac
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::Secret ABSEN_CRON_SECRET kosong/belum di-set di repo ini."
            exit 1
          fi
          echo "APP_URL OK, panjang CRON_SECRET: ${#CRON_SECRET} karakter"
        env:
          APP_URL: ${{ secrets.ABSEN_APP_URL }}
          CRON_SECRET: ${{ secrets.ABSEN_CRON_SECRET }}

      - name: Panggil endpoint cron di Vercel
        run: |
          http_status=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST "${APP_URL}/api/cron/run-absen-schedule" \
            -H "Authorization: Bearer ${CRON_SECRET}")

          echo "HTTP status: $http_status"
          cat response.json

          if [ "$http_status" -ge 300 ]; then
            echo "Endpoint mengembalikan status gagal ($http_status)"
            exit 1
          fi
        env:
          APP_URL: ${{ secrets.ABSEN_APP_URL }}
          CRON_SECRET: ${{ secrets.ABSEN_CRON_SECRET }}
